<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Send Me Money!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating money emojis background */
        .money-rain {
            position: absolute;
            top: -50px;
            font-size: 30px;
            animation: fall linear infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 60px 80px;
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: floatContainer 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .emoji {
            font-size: 5rem;
            margin: 20px 0;
            display: inline-block;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Buttons sit side by side by default. This wrapper stays a normal
           flex container the whole time -- the No button only leaves the
           flow once it has to start running away. */
        .button-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .yes-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.5s;
        }

        .yes-btn:hover:before {
            left: 100%;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .no-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            /* Starts as a normal, in-flow flex item so it sits neatly
               beside the Yes button. JS switches it to `fixed` only
               once the cursor gets close enough that it needs to flee. */
            position: relative;
            /* Stays in normal document flow the whole time -- it only ever
               moves via `transform: translate(...)`, which is clamped to
               the visible window on every move. Nothing ever switches to
               fixed/absolute positioning, so it can never end up somewhere
               off-screen. */
            transition: transform 0.6s ease-in-out;
            will-change: transform;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f0f;
            animation: confettiFall 3s linear;
            pointer-events: none;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Success message */
        .success-message {
            display: none;
            font-size: 2rem;
            color: #fff;
            margin-top: 30px;
            animation: fadeIn 0.5s ease-in;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payment-info {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            color: #333;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payment-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .payment-info p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .emoji {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            button {
                padding: 15px 35px;
                font-size: 1.2rem;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Send Me Money! 💰</h1>
        <div class="emoji">💸</div>
        <p class="subtitle">Would you like to make my day?</p>
        
        <div class="button-container">
            <button class="yes-btn" onclick="handleYes()">
                ✅ Yes!
            </button>
            <button class="no-btn" id="noBtn">
                ❌ No
            </button>
        </div>

        <div class="success-message" id="successMessage">
            🎉 You're AMAZING! 🎉
        </div>

        <div class="payment-info" id="paymentInfo">
            <h3>🎊 Thank you, kind soul! 🎊</h3>
            <p>💳 PayPal: your@email.com</p>
            <p>💰 Venmo: @YourUsername</p>
            <p>🏦 Cash App: $YourCashTag</p>
            <p style="margin-top: 20px; font-size: 1rem; color: #666;">
                (Just kidding! This is an experiment 😄)
            </p>
        </div>
    </div>

    <script>
        // Create floating money emojis
        function createMoneyRain() {
            const moneyEmojis = ['💵', '💴', '💶', '💷', '💰', '💸', '🤑'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const money = document.createElement('div');
                    money.className = 'money-rain';
                    money.textContent = moneyEmojis[Math.floor(Math.random() * moneyEmojis.length)];
                    money.style.left = Math.random() * 100 + '%';
                    money.style.animationDuration = (Math.random() * 3 + 5) + 's';
                    money.style.opacity = Math.random() * 0.5 + 0.3;
                    document.body.appendChild(money);

                    setTimeout(() => money.remove(), 8000);
                }, i * 500);
            }
        }

        // ---- "No" button avoidance logic ----
        // The button never leaves normal document flow and never becomes
        // position:fixed/absolute. It only ever moves via
        // `transform: translate(offsetX, offsetY)`, and offsetX/offsetY are
        // recalculated and clamped against the CURRENT window size on every
        // single hop -- so it is mathematically impossible for it to end up
        // outside the visible screen, on mobile or desktop.
        const noBtn = document.getElementById('noBtn');
        const PADDING = 16; // minimum gap kept between the button and any screen edge
        const HOP_COOLDOWN = 300; // ms -- matches the CSS transition duration,
                                   // so a new hop never interrupts one in flight
        let lastHop = 0;
        let offsetX = 0;
        let offsetY = 0;

        function clamp(value, min, max) {
            return Math.max(min, Math.min(value, max));
        }

        function applyOffset() {
            noBtn.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        }

        function runAway(event) {
            const now = Date.now();
            if (now - lastHop < HOP_COOLDOWN) return; // throttle: no rapid re-triggering
            lastHop = now;

            // Current on-screen box (already includes any prior translate).
            const rect = noBtn.getBoundingClientRect();

            // Its untranslated "home" position -- back this out of the
            // current transform so we can recompute safe bounds fresh.
            const naturalLeft = rect.left - offsetX;
            const naturalTop = rect.top - offsetY;

            const mouseX = event.clientX;
            const mouseY = event.clientY;
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Vector pointing away from the cursor/finger
            let dx = centerX - mouseX;
            let dy = centerY - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            dx /= dist;
            dy /= dist;

            // Short, gentle hop, scaled to screen size so it stays a small,
            // clearly-visible slide on any device instead of a long dash.
            const shortSide = Math.min(window.innerWidth, window.innerHeight);
            const hop = clamp(shortSide * 0.15, 50, 130);

            // Bounds on the OFFSET (not the raw screen position) so the
            // resulting screen position always stays within [PADDING, edge].
            const minOffsetX = PADDING - naturalLeft;
            const maxOffsetX = window.innerWidth - rect.width - PADDING - naturalLeft;
            const minOffsetY = PADDING - naturalTop;
            const maxOffsetY = window.innerHeight - rect.height - PADDING - naturalTop;

            let newOffsetX = clamp(offsetX + dx * hop, minOffsetX, maxOffsetX);
            let newOffsetY = clamp(offsetY + dy * hop, minOffsetY, maxOffsetY);

            // If clamping killed almost all movement (cornered), nudge it
            // toward the more open side of the screen instead of freezing.
            if (Math.abs(newOffsetX - offsetX) < 8 && Math.abs(newOffsetY - offsetY) < 8) {
                newOffsetX = centerX < window.innerWidth / 2 ? maxOffsetX : minOffsetX;
                newOffsetY = centerY < window.innerHeight / 2 ? maxOffsetY : minOffsetY;
            }

            offsetX = newOffsetX;
            offsetY = newOffsetY;
            applyOffset();
        }

        // Trigger on hover/enter only (not on every mousemove pixel) so each
        // dodge is a single deliberate, slow slide rather than a jittery
        // flurry of jumps. Works the same way on touch devices.
        noBtn.addEventListener('mouseenter', runAway);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            runAway({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
        }, { passive: false });

        // If the window/orientation changes, re-clamp the current offset so
        // the button can't end up stranded outside the new viewport.
        window.addEventListener('resize', () => {
            const rect = noBtn.getBoundingClientRect();
            const naturalLeft = rect.left - offsetX;
            const naturalTop = rect.top - offsetY;
            const minOffsetX = PADDING - naturalLeft;
            const maxOffsetX = window.innerWidth - rect.width - PADDING - naturalLeft;
            const minOffsetY = PADDING - naturalTop;
            const maxOffsetY = window.innerHeight - rect.height - PADDING - naturalTop;
            offsetX = clamp(offsetX, minOffsetX, maxOffsetX);
            offsetY = clamp(offsetY, minOffsetY, maxOffsetY);
            applyOffset();
        });

        // Handle Yes button click
        function handleYes() {
            const successMsg = document.getElementById('successMessage');
            const paymentInfo = document.getElementById('paymentInfo');
            const buttonContainer = document.querySelector('.button-container');
            
            buttonContainer.style.display = 'none';
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                paymentInfo.style.display = 'block';
            }, 500);
            
            createConfetti();
            createMoneyRain();
        }

        // Create confetti effect
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = Math.random() * 10 + 5 + 'px';
                    confetti.style.height = Math.random() * 10 + 5 + 'px';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        // Initialize money rain on load
        window.addEventListener('load', () => {
            createMoneyRain();
            setInterval(createMoneyRain, 8000);
        });

        // Add keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleYes();
            }
        });
    </script>
</body>
</html>
